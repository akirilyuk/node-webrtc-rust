name: Build native addon (Linux)
description: Cache, compile, verify, and optionally upload a Linux .node binding

inputs:
  target:
    description: Rust triple (e.g. x86_64-unknown-linux-gnu)
    required: true
  profile:
    description: napi profile (debug or release)
    required: false
    default: release
  cache_prefix:
    description: Prefix for Swatinem/rust-cache
    required: false
    default: v1-native-release
  cache_target_label:
    description: Runner arch label for target/ cache (Linux-x64 or Linux-arm64)
    required: false
    default: Linux-x64
  setup_host_toolchain:
    description: Install Node/Rust/apt deps on GitHub-hosted Linux (no ci-build container)
    required: false
    default: 'false'
  platform:
    description: Pass --platform to napi build
    required: false
    default: 'true'
  zig:
    description: Pass --zig to napi build
    required: false
    default: 'true'
  skip_build_on_cache_hit:
    description: Skip compile when native-binding-cache hit
    required: false
    default: 'false'
  native_cache_hit:
    description: Value from native-binding-cache output
    required: false
    default: 'false'
  binding_cache_key:
    description: Exact cache key from native-binding-cache (enables save after compile)
    required: false
    default: ''
  upload_artifact:
    description: Upload bindings artifact
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install Linux build dependencies
      if: inputs.setup_host_toolchain == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          cmake \
          curl \
          pkg-config

    - name: Setup Node.js
      if: inputs.setup_host_toolchain == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install Rust toolchain
      if: inputs.setup_host_toolchain == 'true'
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - name: Restore Cargo target/ (cross-run warm start)
      id: target-restore
      uses: actions/cache/restore@v4
      with:
        path: target
        key: ${{ inputs.cache_prefix }}-target-${{ inputs.cache_target_label }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
        restore-keys: |
          ${{ inputs.cache_prefix }}-target-${{ inputs.cache_target_label }}-
          ${{ inputs.cache_prefix }}-target-

    - name: Cache Cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: ${{ inputs.cache_prefix }}
        cache-targets: 'false'
        workspaces: .
        shared-key: registry
        add-job-id-key: false
        add-rust-environment-hash-key: false

    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          node_modules
          packages/bindings/node_modules
        key: npm-${{ hashFiles('package-lock.json', 'packages/bindings/package.json') }}
        restore-keys: npm-

    - name: Cache napi-rs Zig toolchain
      if: inputs.zig == 'true'
      uses: actions/cache@v4
      with:
        path: /github/home/.cache/napi-rs-nodejs
        key: napi-zig-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: napi-zig-${{ runner.os }}-

    - name: Install bindings dependencies
      shell: bash
      working-directory: packages/bindings
      run: npm ci --ignore-scripts

    - name: Reuse cached native addon
      if: inputs.skip_build_on_cache_hit == 'true' && inputs.native_cache_hit == 'true'
      shell: bash
      run: echo "Skipping compile for ${{ inputs.target }} — native binding cache hit"

    - name: Build native addon
      if: inputs.skip_build_on_cache_hit != 'true' || inputs.native_cache_hit != 'true'
      shell: bash
      working-directory: packages/bindings
      env:
        CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        OPUS_STATIC: '1'
      run: |
        set -euo pipefail
        rm -f *.node
        args=(build --target "${{ inputs.target }}")
        if [[ "${{ inputs.profile }}" == "release" ]]; then
          args+=(--release)
        fi
        if [[ "${{ inputs.platform }}" == "true" ]]; then
          args+=(--platform)
        fi
        if [[ "${{ inputs.zig }}" == "true" ]]; then
          args+=(--zig)
        fi
        npx napi "${args[@]}"
        # Host-style build emits node-webrtc-rust.node; index.js loads *.linux-x64-gnu.node
        # (or falls back to published optional deps). Mirror local build:debug:local.
        if [[ "${{ inputs.platform }}" != "true" ]]; then
          npm run copy:local-node
        fi

    - name: Verify native NAPI surface
      if: inputs.skip_build_on_cache_hit != 'true' || inputs.native_cache_hit != 'true'
      shell: bash
      run: node scripts/ci/verify-native-binding-surface.mjs --target "${{ inputs.target }}"

    - name: Save native binding cache
      if: inputs.binding_cache_key != '' && inputs.native_cache_hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: packages/bindings/*.node
        key: ${{ inputs.binding_cache_key }}

    - name: Require native artifact
      shell: bash
      working-directory: packages/bindings
      run: |
        shopt -s nullglob
        files=(*.node)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No .node artifact for ${{ inputs.target }}." >&2
          exit 1
        fi

    - name: Upload bindings artifact
      if: inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: bindings-${{ inputs.target }}
        path: packages/bindings/*.node
        if-no-files-found: error
