name: Build native addon (Linux)
description: Cache, compile, verify, and optionally upload a Linux .node binding

inputs:
  target:
    description: Rust triple (e.g. x86_64-unknown-linux-gnu)
    required: true
  profile:
    description: napi profile (debug or release)
    required: false
    default: release
  cache_prefix:
    description: Prefix for Swatinem/rust-cache
    required: false
    default: v1-native-release
  cache_target_label:
    description: Runner arch label for target/ cache (Linux-x64 or Linux-arm64)
    required: false
    default: Linux-x64
  setup_host_toolchain:
    description: Install Node/Rust/apt deps on GitHub-hosted Linux (no ci-build container)
    required: false
    default: 'false'
  platform:
    description: Pass --platform to napi build
    required: false
    default: 'true'
  zig:
    description: Pass --zig to napi build
    required: false
    default: 'true'
  skip_build_on_cache_hit:
    description: Skip compile when native-binding-cache hit
    required: false
    default: 'false'
  native_cache_hit:
    description: Value from native-binding-cache output
    required: false
    default: 'false'
  binding_cache_key:
    description: Exact cache key from native-binding-cache (enables save after compile)
    required: false
    default: ''
  upload_artifact:
    description: Upload bindings artifact
    required: false
    default: 'true'
  use_npm_cache:
    description: Restore npm cache (disable on Alpine — BusyBox tar lacks GNU tar -P)
    required: false
    default: 'true'
  cargo_features:
    description: Optional Cargo features passed to napi build (e.g. linux-musl-shared-sherpa)
    required: false
    default: ''
  cargo_no_default_features:
    description: Pass --no-default-features to cargo (required for linux-musl-shared-sherpa)
    required: false
    default: 'false'
  sherpa_onnx_lib_dir:
    description: SHERPA_ONNX_LIB_DIR for musl builds (musl Sherpa shared libs)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Linux build dependencies
      if: inputs.setup_host_toolchain == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          cmake \
          curl \
          pkg-config

    - name: Setup Node.js
      if: inputs.setup_host_toolchain == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install Rust toolchain
      if: inputs.setup_host_toolchain == 'true'
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - name: Restore Cargo target/ (cross-run warm start)
      id: target-restore
      uses: actions/cache/restore@v4
      with:
        path: target
        key: ${{ inputs.cache_prefix }}-target-${{ inputs.cache_target_label }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
        restore-keys: |
          ${{ inputs.cache_prefix }}-target-${{ inputs.cache_target_label }}-

    - name: Drop stale target/ on inexact cache restore
      if: steps.target-restore.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "target/ cache key miss (cache-hit=${{ steps.target-restore.outputs.cache-hit }}) — removing partial restore"
        rm -rf target

    - name: Cache Cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: ${{ inputs.cache_prefix }}
        cache-targets: 'false'
        workspaces: .
        shared-key: registry
        add-job-id-key: false
        add-rust-environment-hash-key: false

    - name: Cache npm
      if: inputs.use_npm_cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          node_modules
          packages/bindings/node_modules
        key: npm-${{ hashFiles('package-lock.json', 'packages/bindings/package.json') }}
        restore-keys: npm-

    - name: Cache napi-rs Zig toolchain
      if: inputs.zig == 'true'
      uses: actions/cache@v4
      with:
        path: /github/home/.cache/napi-rs-nodejs
        key: napi-zig-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: napi-zig-${{ runner.os }}-

    - name: Install bindings dependencies
      shell: bash
      working-directory: packages/bindings
      run: |
        set -euo pipefail
        if npm ci --ignore-scripts --omit=optional; then
          exit 0
        fi
        echo "npm ci failed (release-prep lock drift); installing @napi-rs/cli only" >&2
        rm -rf node_modules
        npm install --ignore-scripts --no-save --omit=optional @napi-rs/cli@^2.18.0

    - name: Reuse cached native addon
      if: inputs.skip_build_on_cache_hit == 'true' && inputs.native_cache_hit == 'true'
      shell: bash
      run: echo "Skipping compile for ${{ inputs.target }} — native binding cache hit"

    - name: Build native addon
      if: inputs.skip_build_on_cache_hit != 'true' || inputs.native_cache_hit != 'true'
      shell: bash
      working-directory: packages/bindings
      env:
        CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        OPUS_STATIC: '1'
        SHERPA_ONNX_LIB_DIR: ${{ inputs.sherpa_onnx_lib_dir }}
      run: |
        set -euo pipefail
        if [[ -n "${SHERPA_ONNX_LIB_DIR:-}" ]]; then
          export LD_LIBRARY_PATH="${SHERPA_ONNX_LIB_DIR}:/usr/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
        fi
        rm -f *.node
        args=(build --target "${{ inputs.target }}")
        if [[ "${{ inputs.profile }}" == "release" ]]; then
          args+=(--release)
        fi
        if [[ "${{ inputs.platform }}" == "true" ]]; then
          args+=(--platform)
        fi
        if [[ "${{ inputs.zig }}" == "true" ]]; then
          args+=(--zig)
        fi
        if [[ -n "${{ inputs.cargo_features }}" ]]; then
          args+=(--features "${{ inputs.cargo_features }}")
        fi
        if [[ "${{ inputs.cargo_no_default_features }}" == "true" ]]; then
          args+=(--cargo-flags=--no-default-features)
        fi
        npx napi "${args[@]}"
        # Host-style build emits node-webrtc-rust.node; index.js loads *.linux-x64-gnu.node
        # (or falls back to published optional deps). Mirror local build:debug:local.
        if [[ "${{ inputs.platform }}" != "true" ]]; then
          npm run copy:local-node
        fi

    - name: Verify native NAPI surface
      if: inputs.skip_build_on_cache_hit != 'true' || inputs.native_cache_hit != 'true'
      shell: bash
      env:
        SHERPA_ONNX_LIB_DIR: ${{ inputs.sherpa_onnx_lib_dir }}
      run: |
        if [[ -n "${SHERPA_ONNX_LIB_DIR:-}" ]]; then
          export LD_LIBRARY_PATH="${SHERPA_ONNX_LIB_DIR}:/usr/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
        fi
        node scripts/ci/verify-native-binding-surface.mjs --target "${{ inputs.target }}"

    - name: Verify musl runtime on Alpine
      if: |
        (inputs.skip_build_on_cache_hit != 'true' || inputs.native_cache_hit != 'true') &&
        inputs.target == 'x86_64-unknown-linux-musl'
      shell: bash
      run: bash scripts/ci/verify-musl-runtime.sh

    - name: Save native binding cache
      if: inputs.binding_cache_key != '' && inputs.native_cache_hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: packages/bindings/*.node
        key: ${{ inputs.binding_cache_key }}

    - name: Require native artifact
      shell: bash
      working-directory: packages/bindings
      run: |
        shopt -s nullglob
        files=(*.node)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No .node artifact for ${{ inputs.target }}." >&2
          exit 1
        fi

    - name: Upload bindings artifact
      if: inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: bindings-${{ inputs.target }}
        path: packages/bindings/*.node
        if-no-files-found: error
