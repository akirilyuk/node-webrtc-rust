name: Restore Cargo target cache
description: Restore workspace target/ saved by ci-build-native-linux (target-only cache entry)

inputs:
  cache_prefix:
    description: Must match compile/build cache_prefix (e.g. v1-pr-debug)
    required: true

outputs:
  cache-hit:
    description: Whether an exact cache key matched
    value: ${{ steps.target.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Restore Cargo target/
      id: target
      uses: actions/cache/restore@v4
      with:
        path: target
        key: ${{ inputs.cache_prefix }}-target-Linux-x64-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
        restore-keys: |
          ${{ inputs.cache_prefix }}-target-Linux-x64-
          ${{ inputs.cache_prefix }}-target-

    - name: Report Cargo target restore
      shell: bash
      run: |
        if [[ "${{ steps.target.outputs.cache-hit }}" == "true" ]]; then
          echo "Cargo target/ cache hit (${{ inputs.cache_prefix }})"
        elif [[ -d target ]]; then
          echo "Cargo target/ partially restored via restore-keys (${{ inputs.cache_prefix }})"
        else
          echo "Cargo target/ cache miss — cargo test will compile from scratch"
        fi
