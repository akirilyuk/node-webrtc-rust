name: Native binding cache
description: Restore/save per-target .node artifacts keyed by native source hash

inputs:
  target:
    description: Rust triple (e.g. x86_64-unknown-linux-gnu)
    required: true
  profile:
    description: Cargo/napi profile (debug or release)
    required: false
    default: release

outputs:
  cache-hit:
    description: Whether the native .node cache matched
    value: ${{ steps.native.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Restore native binding cache
      id: native
      uses: actions/cache@v4
      with:
        path: packages/bindings/*.node
        key: native-${{ inputs.profile }}-${{ inputs.target }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'crates/**/src/**', 'packages/bindings/Cargo.toml', 'packages/bindings/build.rs', 'packages/bindings/package.json', 'packages/bindings/src/**') }}
        restore-keys: |
          native-${{ inputs.profile }}-${{ inputs.target }}-
