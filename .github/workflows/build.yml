name: Build & Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  packages: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  OPUS_STATIC: '1'

jobs:
  # Always runs (no path filter). Catches broken lockfiles even when quality/test are skipped.
  validate-package-lock:
    name: Package-lock optional bindings
    runs-on: self-hosted
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: ./.github/actions/validate-package-lock

  changes:
    name: Detect changes
    runs-on: self-hosted
    outputs:
      code: ${{ steps.filter.outputs.code }}
      native: ${{ steps.filter.outputs.native }}
      typescript: ${{ steps.filter.outputs.typescript }}
      helpers: ${{ steps.filter.outputs.helpers }}
      examples: ${{ steps.filter.outputs.examples }}
      workflows: ${{ steps.filter.outputs.workflows }}
      workflows_native: ${{ steps.filter.outputs.workflows_native }}
      workflows_test: ${{ steps.filter.outputs.workflows_test }}
      workflows_ts: ${{ steps.filter.outputs.workflows_ts }}
      skip_test: ${{ steps.pr_gates.outputs.skip_test }}
      skip_quality: ${{ steps.pr_gates.outputs.skip_quality }}
      run_compile: ${{ steps.pr_gates.outputs.run_compile }}
      run_build_ts: ${{ steps.pr_gates.outputs.run_build_ts }}
      run_test: ${{ steps.pr_gates.outputs.run_test }}
      needs_native_for_test: ${{ steps.pr_gates.outputs.needs_native }}
      needs_ts_for_test: ${{ steps.pr_gates.outputs.needs_ts }}
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ github.token }}
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
            native:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'packages/bindings/**'
              - '!**/*.md'
              - '!packages/bindings/*.node'
              - '!packages/bindings/index.d.ts'
              - '!packages/bindings/index.js'
            typescript:
              - 'packages/sdk/**'
              - 'packages/signaling/**'
              - 'packages/helpers/**'
              - 'package.json'
              - 'package-lock.json'
              - '**/tsconfig*.json'
              - 'eslint.config.js'
              - '.prettierrc*'
              - '!**/*.md'
            helpers:
              - 'packages/helpers/**'
              - 'examples/voice-agent-local-sherpa-multi-client/**'
              - '!**/*.md'
            examples:
              - 'examples/**'
              - '!**/*.md'
            workflows:
              - '.github/**'
              - 'docker/ci/**'
              - 'scripts/ci/**'
              - '!**/*.md'
            workflows_native:
              - '.github/actions/ci-build-native-*'
              - '.github/actions/native-binding-cache/**'
              - 'docker/ci/**'
              - 'scripts/ci/native-binding-cache-key.sh'
              - 'scripts/ci/verify-native-binding-surface.mjs'
            workflows_test:
              - '.github/actions/ci-run-integration-tests/**'
              - '.github/workflows/reusable-test.yml'
              - 'scripts/ci/run-pr-integration.sh'
              - 'scripts/ci/run-pr-tests-full.sh'
              - 'scripts/ci/run-sherpa-example-ci.sh'
              - 'scripts/ci/run-sherpa-roundtrip-e2e.sh'
              - 'scripts/ci/run-pr-test-job-docker.sh'
            workflows_ts:
              - '.github/actions/ci-cache-ts-dist/**'
              - 'scripts/ci/build-ts-workspace.sh'
              - 'scripts/ci/verify-release-publish-ts.sh'
              - 'scripts/ci/ts-dist-cache-key.sh'

      - name: Compute PR job gates
        id: pr_gates
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          run_compile=false
          run_build_ts=false
          run_test=false
          run_quality=false

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            [[ "$path" == *.md || "$path" == docs/* ]] && continue

            if [[ "$path" == .github/workflows/* || "$path" == .cursor/* ]]; then
              run_quality=true
              continue
            fi
            if [[ "$path" == .github/actions/ci-build-native-* || "$path" == .github/actions/native-binding-cache/* || "$path" == docker/ci/* || "$path" == scripts/ci/native-binding-cache-key.sh || "$path" == scripts/ci/verify-native-binding-surface.mjs ]]; then
              run_compile=true
              run_quality=true
              continue
            fi
            if [[ "$path" == .github/actions/ci-cache-ts-dist/* || "$path" == scripts/ci/build-ts-workspace.sh || "$path" == scripts/ci/verify-release-publish-ts.sh || "$path" == scripts/ci/ts-dist-cache-key.sh ]]; then
              run_build_ts=true
              run_quality=true
              continue
            fi
            if [[ "$path" == .github/actions/ci-run-integration-tests/* || "$path" == .github/workflows/reusable-test.yml || "$path" == scripts/ci/run-pr-integration.sh || "$path" == scripts/ci/run-pr-tests-full.sh || "$path" == scripts/ci/run-sherpa-example-ci.sh || "$path" == scripts/ci/run-sherpa-roundtrip-e2e.sh || "$path" == scripts/ci/run-pr-test-job-docker.sh ]]; then
              run_quality=true
              continue
            fi
            if [[ "$path" == Cargo.toml || "$path" == Cargo.lock || "$path" =~ ^crates/ || "$path" =~ ^packages/bindings/ ]]; then
              run_compile=true
              run_test=true
              run_quality=true
              continue
            fi
            if [[ "$path" =~ ^packages/sdk/ || "$path" =~ ^packages/signaling/ || "$path" =~ ^packages/helpers/ || "$path" == package.json || "$path" == package-lock.json || "$path" == eslint.config.js || "$path" == .prettierrc* || "$path" == *tsconfig*.json ]]; then
              run_build_ts=true
              run_test=true
              run_quality=true
              continue
            fi
            if [[ "$path" =~ ^examples/ ]]; then
              run_build_ts=true
              run_test=true
              run_quality=true
              continue
            fi
            if [[ "$path" == scripts/ci/* ]]; then
              run_quality=true
              continue
            fi

            run_quality=true
            run_test=true
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          # Integration tests always need a .node in the workspace. TS-only PRs do not
          # touch Rust paths but still run Test — compile must run so the job uploads
          # bindings-x86_64-unknown-linux-gnu for reusable-test to download.
          if [[ "$run_test" == true ]]; then
            run_compile=true
          fi

          echo "run_compile=${run_compile}" >> "$GITHUB_OUTPUT"
          echo "run_build_ts=${run_build_ts}" >> "$GITHUB_OUTPUT"
          echo "run_test=${run_test}" >> "$GITHUB_OUTPUT"
          echo "run_quality=${run_quality}" >> "$GITHUB_OUTPUT"

          if [[ "$run_test" == true ]]; then
            echo "skip_test=false" >> "$GITHUB_OUTPUT"
            echo "needs_native=true" >> "$GITHUB_OUTPUT"
            echo "needs_ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_test=true" >> "$GITHUB_OUTPUT"
            echo "needs_native=false" >> "$GITHUB_OUTPUT"
            echo "needs_ts=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$run_quality" == true ]]; then
            echo "skip_quality=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip_quality=true" >> "$GITHUB_OUTPUT"
          fi

          echo "::notice::PR gates from git diff — compile=${run_compile} build_ts=${run_build_ts} test=${run_test} quality=${run_quality}"

  quality:
    name: Typecheck & lint
    needs: [changes, validate-package-lock]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success'
    runs-on: self-hosted
    outputs:
      ran_quality: ${{ steps.gate.outputs.run }}
    steps:
      - name: Skip when docs-only (no code or CI changes)
        id: gate
        run: |
          if [[ "${{ needs.changes.outputs.run_quality }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping typecheck & lint — docs-only PR (no code or CI changes)."
          fi

      - name: Prepare workspace
        if: steps.gate.outputs.run == 'true'
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Typecheck, lint, and unit tests
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/ci/run-pr-quality.sh

  compile-native:
    name: Compile native
    needs: [changes, validate-package-lock, quality]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success'
    runs-on: self-hosted
    outputs:
      ran_compile: ${{ steps.gate.outputs.run }}
    container:
      image: ghcr.io/${{ github.repository }}/ci-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Skip when no native or native-CI changes
        id: gate
        run: |
          if [[ "${{ needs.changes.outputs.run_compile }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping native compile — no Rust/bindings or native-build CI changes in this PR."
          fi

      - name: Require quality passed before native compile
        if: steps.gate.outputs.run == 'true' && needs.quality.outputs.ran_quality == 'true' && needs.quality.result != 'success'
        run: |
          echo "Typecheck & lint must pass before native compile (quality=${{ needs.quality.result }})." >&2
          exit 1

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: ./.github/actions/native-binding-cache
        if: steps.gate.outputs.run == 'true'
        id: native-cache
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug

      - uses: ./.github/actions/ci-build-native-linux
        if: steps.gate.outputs.run == 'true'
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug
          cache_prefix: v1-pr-debug
          platform: 'false'
          zig: 'false'
          skip_build_on_cache_hit: 'true'
          native_cache_hit: ${{ steps.native-cache.outputs.cache-hit }}
          binding_cache_key: ${{ steps.native-cache.outputs.cache-key }}

  build-ts:
    name: Build TypeScript
    needs: [changes, validate-package-lock, quality]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success'
    runs-on: self-hosted
    outputs:
      ran_build: ${{ steps.gate.outputs.run }}
    steps:
      - name: Skip when no TypeScript or TS-CI changes
        id: gate
        run: |
          if [[ "${{ needs.changes.outputs.run_build_ts }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping TypeScript build — no TS/examples or TS-build CI changes in this PR."
          fi

      - name: Require quality passed before TypeScript build
        if: steps.gate.outputs.run == 'true' && needs.quality.outputs.ran_quality == 'true' && needs.quality.result != 'success'
        run: |
          echo "Typecheck & lint must pass before TypeScript build (quality=${{ needs.quality.result }})." >&2
          exit 1

      - name: Prepare workspace
        if: steps.gate.outputs.run == 'true'
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: ./.github/actions/ci-cache-ts-dist
        if: steps.gate.outputs.run == 'true'
        id: ts-cache

      - name: Build TypeScript packages
        if: steps.gate.outputs.run == 'true' && steps.ts-cache.outputs.cache-hit != 'true'
        run: |
          bash scripts/ci/validate-package-lock-optional-bindings.sh
          npm ci
          bash scripts/fix-rollup-native.sh
          bash scripts/ci/build-ts-workspace.sh

  test:
    name: Test
    needs: [changes, validate-package-lock, quality, compile-native, build-ts]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success' &&
      needs.compile-native.result != 'failure' &&
      needs.build-ts.result != 'failure'
    uses: ./.github/workflows/reusable-test.yml
    with:
      test_script: scripts/ci/run-pr-integration.sh
      skip: ${{ needs.changes.outputs.skip_test }}
      quality_result: ${{ needs.quality.result }}
      binding_artifact: ${{ needs.compile-native.outputs.ran_compile == 'true' && 'bindings-x86_64-unknown-linux-gnu' || '' }}
      require_binding_artifact: ${{ needs.compile-native.outputs.ran_compile == 'true' && 'true' || 'false' }}
      needs_native_binding: ${{ needs.changes.outputs.needs_native_for_test }}
      needs_ts_dist: ${{ needs.changes.outputs.needs_ts_for_test }}
    secrets: inherit
