name: Build & Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  OPUS_STATIC: '1'

jobs:
  changes:
    name: Detect changes
    runs-on: self-hosted
    outputs:
      native: ${{ steps.filter.outputs.native }}
      typescript: ${{ steps.filter.outputs.typescript }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ github.token }}
          filters: |
            native:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'packages/bindings/**'
              - '!packages/bindings/*.node'
              - '!packages/bindings/index.d.ts'
              - '!packages/bindings/index.js'
            typescript:
              - 'packages/sdk/**'
              - 'packages/signaling/**'
              - 'package.json'
              - 'package-lock.json'
              - '**/tsconfig*.json'
              - 'eslint.config.js'
              - '.prettierrc*'
            workflows:
              - '.github/**'
              - 'docker/ci/**'

  quality:
    name: Typecheck & lint
    needs: changes
    if: |
      needs.changes.outputs.native == 'true' ||
      needs.changes.outputs.typescript == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: self-hosted
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: bash scripts/ci/run-pr-quality.sh

  compile-native:
    name: Compile native
    needs: [changes, quality]
    if: |
      always() &&
      !cancelled() &&
      needs.quality.result == 'success' &&
      (
        needs.changes.outputs.native == 'true' ||
        needs.changes.outputs.workflows == 'true'
      )
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository }}/ci-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/native-binding-cache
        id: native-cache
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug

      - uses: ./.github/actions/ci-build-native-linux
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug
          cache_prefix: v1-pr-debug
          platform: 'false'
          zig: 'false'
          skip_build_on_cache_hit: 'true'
          native_cache_hit: ${{ steps.native-cache.outputs.cache-hit }}
          binding_cache_key: ${{ steps.native-cache.outputs.cache-key }}

  build-ts:
    name: Build TypeScript
    needs: [changes, quality, compile-native]
    if: |
      always() &&
      !cancelled() &&
      needs.quality.result == 'success' &&
      (needs.compile-native.result == 'success' || needs.compile-native.result == 'skipped') &&
      needs.compile-native.result != 'failure' &&
      (
        needs.changes.outputs.typescript == 'true' ||
        needs.changes.outputs.workflows == 'true'
      )
    runs-on: self-hosted
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: ./.github/actions/ci-cache-ts-dist
        id: ts-cache

      - name: Build TypeScript packages
        if: steps.ts-cache.outputs.cache-hit != 'true'
        run: |
          npm ci
          bash scripts/ci/build-ts-workspace.sh

  test:
    name: Test
    needs: [changes, quality, compile-native, build-ts]
    if: |
      always() &&
      !cancelled() &&
      needs.quality.result == 'success' &&
      (needs.compile-native.result == 'success' || needs.compile-native.result == 'skipped') &&
      (needs.build-ts.result == 'success' || needs.build-ts.result == 'skipped') &&
      needs.compile-native.result != 'failure' &&
      needs.build-ts.result != 'failure' &&
      (
        needs.changes.outputs.native == 'true' ||
        needs.changes.outputs.typescript == 'true' ||
        needs.changes.outputs.workflows == 'true'
      )
    uses: ./.github/workflows/reusable-test.yml
    with:
      test_script: scripts/ci/run-pr-integration.sh
      require_binding_artifact: ${{ needs.changes.outputs.native == 'true' || needs.changes.outputs.workflows == 'true' }}
    secrets: inherit
