name: Build & Publish Bindings

on:
  push:
    branches: [main, initial-feature]
    tags: ['v*']
  pull_request:
    branches: [main, initial-feature]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            build-args: --target x86_64-apple-darwin

          - target: aarch64-apple-darwin
            os: macos-latest
            build-args: --target aarch64-apple-darwin

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            build-args: --target x86_64-unknown-linux-gnu
            cross: true

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            build-args: --target x86_64-unknown-linux-musl
            cross: true

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            build-args: --target aarch64-unknown-linux-gnu
            cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            build-args: --target x86_64-pc-windows-msvc

    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Install dependencies
        working-directory: packages/bindings
        run: npm ci --ignore-scripts

      - name: Build native addon
        working-directory: packages/bindings
        run: |
          npx napi build --platform --release ${{ matrix.build-args }} ${{ matrix.cross && '-x' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/bindings/*.node
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Download native binding
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: packages/bindings/

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: cargo test -p node-webrtc-rust-core
      - run: npm run build:ts
      - run: npm test

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: packages/bindings
        run: npm ci --ignore-scripts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/bindings/artifacts

      - name: Move artifacts
        working-directory: packages/bindings
        run: npx napi artifacts --dir artifacts

      - name: Publish platform packages
        working-directory: packages/bindings
        run: npx napi prepublish -t npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm packages
        working-directory: packages/bindings
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              npm publish "$dir" --access public || true
            fi
          done
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
