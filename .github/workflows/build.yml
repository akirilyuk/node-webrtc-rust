name: Build & Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  packages: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  OPUS_STATIC: '1'

jobs:
  # Always runs (no path filter). Catches broken lockfiles even when quality/test are skipped.
  validate-package-lock:
    name: Package-lock optional bindings
    runs-on: self-hosted
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: ./.github/actions/validate-package-lock

  changes:
    name: Detect changes
    runs-on: self-hosted
    outputs:
      code: ${{ steps.filter.outputs.code }}
      native: ${{ steps.filter.outputs.native }}
      typescript: ${{ steps.filter.outputs.typescript }}
      helpers: ${{ steps.filter.outputs.helpers }}
      examples: ${{ steps.filter.outputs.examples }}
      workflows: ${{ steps.filter.outputs.workflows }}
      workflows_native: ${{ steps.filter.outputs.workflows_native }}
      workflows_test: ${{ steps.filter.outputs.workflows_test }}
      workflows_ts: ${{ steps.filter.outputs.workflows_ts }}
      skip_test: ${{ steps.pr_gates.outputs.skip_test }}
      skip_quality: ${{ steps.pr_gates.outputs.skip_quality }}
      run_compile: ${{ steps.pr_gates.outputs.run_compile }}
      run_build_ts: ${{ steps.pr_gates.outputs.run_build_ts }}
      run_test: ${{ steps.pr_gates.outputs.run_test }}
      run_compile_native: ${{ steps.job_gates.outputs.run_compile_native }}
      run_integration_test: ${{ steps.job_gates.outputs.run_integration_test }}
      needs_native_for_test: ${{ steps.pr_gates.outputs.needs_native }}
      needs_ts_for_test: ${{ steps.pr_gates.outputs.needs_ts }}
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ github.token }}
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
            native:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'packages/bindings/**'
              - '!**/*.md'
              - '!packages/bindings/*.node'
              - '!packages/bindings/index.d.ts'
              - '!packages/bindings/index.js'
            typescript:
              - 'packages/sdk/**'
              - 'packages/signaling/**'
              - 'packages/helpers/**'
              - 'package.json'
              - 'package-lock.json'
              - '**/tsconfig*.json'
              - 'eslint.config.js'
              - '.prettierrc*'
              - '!**/*.md'
            helpers:
              - 'packages/helpers/**'
              - 'examples/voice-agent-local-sherpa-multi-client/**'
              - '!**/*.md'
            examples:
              - 'examples/**'
              - '!**/*.md'
            workflows:
              - '.github/**'
              - 'docker/ci/**'
              - 'scripts/ci/**'
              - '!**/*.md'
            workflows_native:
              - '.github/actions/ci-build-native-*'
              - '.github/actions/native-binding-cache/**'
              - 'docker/ci/**'
              - 'scripts/ci/native-binding-cache-key.sh'
              - 'scripts/ci/verify-native-binding-surface.mjs'
            workflows_test:
              - '.github/actions/ci-run-integration-tests/**'
              - '.github/workflows/reusable-test.yml'
              - 'scripts/ci/run-pr-integration.sh'
              - 'scripts/ci/run-pr-tests-full.sh'
              - 'scripts/ci/run-sherpa-example-ci.sh'
              - 'scripts/ci/run-sherpa-roundtrip-e2e.sh'
              - 'scripts/ci/run-pr-test-job-docker.sh'
              - 'scripts/ci/compute-pr-job-gates.sh'
            workflows_ts:
              - '.github/actions/ci-cache-ts-dist/**'
              - 'scripts/ci/build-ts-workspace.sh'
              - 'scripts/ci/verify-release-publish-ts.sh'
              - 'scripts/ci/ts-dist-cache-key.sh'

      - name: Compute PR job gates
        id: pr_gates
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          FILTER_NATIVE: ${{ steps.filter.outputs.native }}
          FILTER_WORKFLOWS_NATIVE: ${{ steps.filter.outputs.workflows_native }}
        run: |
          bash scripts/ci/compute-pr-job-gates.sh \
            "$PR_BASE_SHA" \
            "$PR_HEAD_SHA" \
            "$FILTER_NATIVE" \
            "$FILTER_WORKFLOWS_NATIVE" >> "$GITHUB_OUTPUT"

      # Compute on the self-hosted runner (bash 5). compile-native runs inside the
      # ci-build container where `${var,,}` and other bash-4+ syntax is unavailable.
      - name: Derive compile and integration job gates
        id: job_gates
        env:
          RUN_COMPILE: ${{ steps.pr_gates.outputs.run_compile }}
          SKIP_TEST: ${{ steps.pr_gates.outputs.skip_test }}
          FILTER_NATIVE: ${{ steps.filter.outputs.native }}
          FILTER_WORKFLOWS_NATIVE: ${{ steps.filter.outputs.workflows_native }}
        run: |
          if [ "$RUN_COMPILE" = "true" ] || [ "$FILTER_NATIVE" = "true" ] || [ "$FILTER_WORKFLOWS_NATIVE" = "true" ]; then
            echo "run_compile_native=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_compile_native=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$SKIP_TEST" != "true" ] || [ "$RUN_COMPILE" = "true" ] || [ "$FILTER_NATIVE" = "true" ]; then
            echo "run_integration_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_integration_test=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Typecheck & lint
    needs: [changes, validate-package-lock]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success'
    runs-on: self-hosted
    outputs:
      ran_quality: ${{ steps.gate.outputs.run }}
    steps:
      - name: Skip when docs-only (no code or CI changes)
        id: gate
        run: |
          if [[ "${{ needs.changes.outputs.run_quality }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping typecheck & lint — docs-only PR (no code or CI changes)."
          fi

      - name: Prepare workspace
        if: steps.gate.outputs.run == 'true'
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Typecheck, lint, and unit tests
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/ci/run-pr-quality.sh

  compile-native:
    name: Compile native
    needs: [changes, validate-package-lock, quality]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success'
    runs-on: self-hosted
    outputs:
      ran_compile: ${{ steps.gate.outputs.run }}
    container:
      image: ghcr.io/${{ github.repository }}/ci-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Skip when no native or native-CI changes
        id: gate
        run: |
          if [ "${{ needs.changes.outputs.run_compile_native }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping native compile — no Rust/bindings or native-build CI changes in this PR."
          fi

      - name: Require quality passed before native compile
        if: steps.gate.outputs.run == 'true' && needs.quality.outputs.ran_quality == 'true' && needs.quality.result != 'success'
        run: |
          echo "Typecheck & lint must pass before native compile (quality=${{ needs.quality.result }})." >&2
          exit 1

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: ./.github/actions/native-binding-cache
        if: steps.gate.outputs.run == 'true'
        id: native-cache
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug

      - uses: ./.github/actions/ci-build-native-linux
        if: steps.gate.outputs.run == 'true'
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug
          cache_prefix: v1-pr-debug
          platform: 'false'
          zig: 'false'
          # When compile-native runs, always rebuild — binding cache is for Test restore only.
          skip_build_on_cache_hit: 'false'
          native_cache_hit: ${{ steps.native-cache.outputs.cache-hit }}
          binding_cache_key: ${{ steps.native-cache.outputs.cache-key }}

  build-ts:
    name: Build TypeScript
    needs: [changes, validate-package-lock, quality]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success'
    runs-on: self-hosted
    outputs:
      ran_build: ${{ steps.gate.outputs.run }}
    steps:
      - name: Skip when no TypeScript or TS-CI changes
        id: gate
        run: |
          if [[ "${{ needs.changes.outputs.run_build_ts }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping TypeScript build — no TS/examples or TS-build CI changes in this PR."
          fi

      - name: Require quality passed before TypeScript build
        if: steps.gate.outputs.run == 'true' && needs.quality.outputs.ran_quality == 'true' && needs.quality.result != 'success'
        run: |
          echo "Typecheck & lint must pass before TypeScript build (quality=${{ needs.quality.result }})." >&2
          exit 1

      - name: Prepare workspace
        if: steps.gate.outputs.run == 'true'
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: ./.github/actions/ci-cache-ts-dist
        if: steps.gate.outputs.run == 'true'
        id: ts-cache

      - name: Build TypeScript packages
        if: steps.gate.outputs.run == 'true' && steps.ts-cache.outputs.cache-hit != 'true'
        run: |
          bash scripts/ci/validate-package-lock-optional-bindings.sh
          npm ci
          bash scripts/fix-rollup-native.sh
          bash scripts/ci/build-ts-workspace.sh

  # Inline integration tests (not reusable-test.yml): workflow_call cannot download
  # caller artifacts; compile-native runs in a container while Test runs on the
  # self-hosted host — artifact handoff is unreliable. Test restores GHA cache and
  # compiles in CI image when needed.
  test:
    name: Test
    needs: [changes, validate-package-lock, quality, compile-native, build-ts]
    if: |
      always() &&
      !cancelled() &&
      needs.validate-package-lock.result == 'success' &&
      needs.compile-native.result != 'failure' &&
      needs.build-ts.result != 'failure'
    runs-on: self-hosted
    env:
      TURN_AVAILABLE: '1'
      CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
    steps:
      - name: Resolve integration test gates
        id: gate
        run: |
          if [ "${{ needs.changes.outputs.run_integration_test }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping integration tests — no source code changes in this PR."
          fi
          if [ "${{ needs.changes.outputs.run_compile_native }}" = "true" ] || [ "${{ needs.changes.outputs.needs_native_for_test }}" = "true" ]; then
            echo "needs_native=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_native=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ needs.changes.outputs.needs_ts_for_test }}" = "true" ]; then
            echo "needs_ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_ts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require quality passed before integration tests
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.needs_native == 'true' && needs.quality.result != 'success'
        run: |
          echo "Typecheck & lint must pass before integration tests (quality=${{ needs.quality.result }})." >&2
          exit 1

      - name: Prepare workspace
        if: steps.gate.outputs.skip != 'true'
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - uses: ./.github/actions/native-binding-cache
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.needs_native == 'true'
        id: native-cache
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug

      - name: Discard cached .node when Rust sources changed in PR
        if: |
          steps.gate.outputs.skip != 'true' &&
          steps.gate.outputs.needs_native == 'true' &&
          (needs.changes.outputs.native == 'true' || needs.changes.outputs.workflows_native == 'true')
        run: |
          shopt -s nullglob
          files=(packages/bindings/*.node)
          if [[ ${#files[@]} -gt 0 ]]; then
            echo "::notice::Rust/native paths changed — removing restored .node so Test rebuilds against current sources."
            rm -f packages/bindings/*.node
          fi

      - name: Build native binding in CI image when cache miss
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.needs_native == 'true'
        run: |
          shopt -s nullglob
          files=(packages/bindings/*.node)
          if [[ ${#files[@]} -gt 0 ]]; then
            echo "Native binding already present: $(basename "${files[0]}")"
            exit 0
          fi
          echo "No cached .node — compiling in ${{ env.CI_IMAGE }}"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            -e CMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -e OPUS_STATIC=1 \
            "${{ env.CI_IMAGE }}" \
            bash -c '
              set -euo pipefail
              cd packages/bindings
              npm ci --ignore-scripts
              npx napi build --target x86_64-unknown-linux-gnu
              npm run copy:local-node
            '
          files=(packages/bindings/*.node)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "Native build in CI image did not produce a .node file." >&2
            exit 1
          fi
          echo "Built native binding: $(basename "${files[0]}")"

      - name: Verify native binding in workspace
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.needs_native == 'true'
        run: |
          shopt -s nullglob
          files=(packages/bindings/*.node)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No .node in packages/bindings after artifact/cache restore." >&2
            exit 1
          fi
          echo "Native binding ready: $(basename "${files[0]}")"

      - uses: ./.github/actions/ci-cache-ts-dist
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.needs_ts == 'true'
        id: ts-cache
        with:
          profile: release

      - uses: ./.github/actions/ci-run-integration-tests
        if: steps.gate.outputs.skip != 'true'
        with:
          test_script: scripts/ci/run-pr-integration.sh
          ci_image: ${{ env.CI_IMAGE }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ts_dist_cache_hit: ${{ steps.ts-cache.outputs.cache-hit || 'false' }}
