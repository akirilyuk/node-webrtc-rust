name: Build & Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  OPUS_STATIC: "1"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
      typescript: ${{ steps.filter.outputs.typescript }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ github.token }}
          filters: |
            native:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'packages/bindings/**'
              - '!packages/bindings/*.node'
              - '!packages/bindings/index.d.ts'
              - '!packages/bindings/index.js'
            typescript:
              - 'packages/sdk/**'
              - 'packages/signaling/**'
              - 'package.json'
              - 'package-lock.json'
              - '**/tsconfig*.json'
              - 'eslint.config.js'
              - '.prettierrc*'
            workflows:
              - '.github/**'
              - 'docker/ci/**'

  quality:
    name: Typecheck & lint
    needs: changes
    if: |
      needs.changes.outputs.native == 'true' ||
      needs.changes.outputs.typescript == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/ci/run-pr-quality.sh

  build:
    name: Build
    needs: [changes, quality]
    if: |
      needs.changes.outputs.native == 'true' ||
      needs.changes.outputs.typescript == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/native-binding-cache
        id: native-cache
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug

      - uses: ./.github/actions/ci-build-native-linux
        with:
          target: x86_64-unknown-linux-gnu
          profile: debug
          cache_prefix: v1-pr-debug
          platform: 'false'
          zig: 'false'
          skip_build_on_cache_hit: 'true'
          native_cache_hit: ${{ steps.native-cache.outputs.cache-hit }}

  test:
    name: Test
    needs: [changes, quality, build]
    if: |
      always() &&
      !cancelled() &&
      needs.quality.result == 'success' &&
      needs.build.result == 'success'
    uses: ./.github/workflows/reusable-test.yml
    with:
      test_script: scripts/ci/run-pr-integration.sh
    secrets: inherit
