name: CI Docker image

# Rebuild and publish CI containers from the `ci` branch (or `main` when Dockerfiles change).
# Workflows pull ghcr.io/.../ci-build:latest (glibc) and ci-build-alpine:latest (musl).

on:
  push:
    branches: [ci, main]
    paths:
      - 'docker/ci/**'
      - 'scripts/ci/install-alpine-native-toolchain.sh'
  workflow_dispatch:

env:
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
  CI_ALPINE_IMAGE: ghcr.io/${{ github.repository }}/ci-build-alpine:latest

jobs:
  build-and-push:
    name: Build and push CI image
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI image
        uses: docker/build-push-action@v6
        with:
          context: docker/ci
          push: true
          tags: |
            ${{ env.CI_IMAGE }}
            ghcr.io/${{ github.repository }}/ci-build:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Alpine CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci/Dockerfile.alpine
          push: true
          tags: |
            ${{ env.CI_ALPINE_IMAGE }}
            ghcr.io/${{ github.repository }}/ci-build-alpine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
