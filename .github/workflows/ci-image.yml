name: CI Docker image

# Rebuild and publish the CI container only from the `ci` branch.
# All other workflows pull ghcr.io/.../ci-build:latest.

on:
  push:
    branches: [ci]
  workflow_dispatch:

env:
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest

jobs:
  build-and-push:
    name: Build and push CI image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI image
        uses: docker/build-push-action@v6
        with:
          context: docker/ci
          push: true
          tags: |
            ${{ env.CI_IMAGE }}
            ghcr.io/${{ github.repository }}/ci-build:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
