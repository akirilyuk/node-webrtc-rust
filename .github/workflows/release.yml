name: Release

# Builds all targets, runs tests, publishes to npm, and creates a GitHub Release.
# Trigger by pushing a tag: git tag release/0.1.0 && git push origin release/0.1.0

on:
  push:
    tags: ['release/*']

permissions:
  contents: write
  packages: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  OPUS_STATIC: "1"

jobs:
  quality:
    name: Typecheck & lint
    runs-on: self-hosted
    steps:
      - name: Prepare workspace
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: bash scripts/ci/run-pr-quality.sh

  build-linux:
    needs: quality
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      cache_prefix: v1-release
    secrets: inherit

  build-host:
    needs: quality
    uses: ./.github/workflows/reusable-build-host.yml
    with:
      cache_prefix: v1-release
    secrets: inherit

  test:
    needs: [quality, build-linux, build-host]
    if: |
      !cancelled() &&
      needs.quality.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-host.result == 'success'
    uses: ./.github/workflows/reusable-test.yml
    with:
      test_script: scripts/ci/run-pr-integration.sh
      binding_profile: release
      require_binding_artifact: true
    secrets: inherit

  publish:
    name: Publish release
    needs: [quality, build-linux, build-host, test]
    if: |
      !cancelled() &&
      needs.quality.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-host.result == 'success' &&
      needs.test.result == 'success'
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository }}/ci-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # ci-build container user ≠ checkout owner; napi version invokes git
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve release version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#release/}"
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing release version: $VERSION"

      - run: npm ci --ignore-scripts

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ci-artifacts

      - name: Stage binding artifacts
        shell: bash
        working-directory: packages/bindings
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          for dir in ../../ci-artifacts/bindings-*; do
            cp -r "$dir" "artifacts/$(basename "$dir")"
          done
          npx napi artifacts --dir artifacts

      - name: Set workspace package versions
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd packages/bindings
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npx napi version
          cd ../..
          bash scripts/ci/set-release-deps.sh "$VERSION"

      - name: Build TypeScript packages
        run: bash scripts/ci/build-ts-workspace.sh

      # napi artifacts + napi version already stage per-platform packages.
      # Do not run `napi prepublish` here — it tries to npm publish and create a
      # GitHub release before auth is configured (see release-local.sh).
      - name: Verify binding packages are staged
        shell: bash
        working-directory: packages/bindings
        run: |
          set -euo pipefail
          for dir in npm/*/; do
            shopt -s nullglob
            nodes=("$dir"*.node)
            if [[ ${#nodes[@]} -eq 0 ]]; then
              echo "Missing .node in $dir (napi artifacts should have copied it)" >&2
              exit 1
            fi
            echo "  ok: $(basename "$dir") (${nodes[0]##*/})"
          done

      - name: Configure npm registry auth
        shell: bash
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm packages
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BINDINGS="packages/bindings"

          publish_dir() {
            local dir="$1"
            local label="$2"
            shift 2
            local extra=("$@")
            if [[ ! -f "${dir}package.json" ]]; then
              return 0
            fi
            if [[ "$dir" == "${BINDINGS}/npm/"* ]]; then
              shopt -s nullglob
              local nodes=("$dir"*.node)
              if [[ ${#nodes[@]} -eq 0 ]]; then
                echo "Missing .node in $dir" >&2
                exit 1
              fi
            fi
            echo "  publishing $label@${VERSION}"
            (cd "$dir" && npm publish --access public "${extra[@]}")
          }

          verify_published() {
            bash scripts/ci/wait-for-npm-package.sh "$1" "$VERSION"
          }

          echo "==> Platform binding packages"
          for dir in "${BINDINGS}"/npm/*/; do
            pkg="$(node -p "require('./${dir}package.json').name")"
            publish_dir "$dir" "$pkg"
            verify_published "$pkg"
          done

          echo "==> @node-webrtc-rust/bindings"
          publish_dir "$BINDINGS/" "@node-webrtc-rust/bindings" --ignore-scripts
          verify_published "@node-webrtc-rust/bindings"

          echo "==> @node-webrtc-rust/signaling"
          publish_dir "packages/signaling/" "@node-webrtc-rust/signaling" --ignore-scripts --omit=dev
          verify_published "@node-webrtc-rust/signaling"

          echo "==> @node-webrtc-rust/sdk"
          publish_dir "packages/sdk/" "@node-webrtc-rust/sdk" --ignore-scripts
          verify_published "@node-webrtc-rust/sdk"

          echo "==> @node-webrtc-rust/helpers"
          publish_dir "packages/helpers/" "@node-webrtc-rust/helpers" --ignore-scripts
          verify_published "@node-webrtc-rust/helpers"

          echo "==> Published @node-webrtc-rust/*@${VERSION} to npm"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare GitHub release notes from CHANGELOG
        id: release_notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BODY_FILE="${RUNNER_TEMP}/release-notes.md"
          bash scripts/changelog-release-body.sh "$VERSION" > "$BODY_FILE"
          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.body_file }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
