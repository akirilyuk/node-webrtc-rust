name: Reusable — build macOS / Windows native targets

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  OPUS_STATIC: "1"

on:
  workflow_call:
    inputs:
      cache_prefix:
        description: Swatinem/rust-cache prefix key
        type: string
        default: v1-native-release
      use_native_cache:
        description: Restore/save per-target .node cache before compile
        type: boolean
        default: true
      host_matrix:
        description: JSON array of {target,os,build-args} to compile
        type: string
        default: '[{"target":"x86_64-apple-darwin","os":"macos-latest","build-args":"--target x86_64-apple-darwin"},{"target":"aarch64-apple-darwin","os":"macos-latest","build-args":"--target aarch64-apple-darwin"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","build-args":"--target x86_64-pc-windows-msvc"}]'

jobs:
  build-host:
    name: Build - ${{ matrix.target }}
    if: inputs.host_matrix != '[]' && inputs.host_matrix != ''
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.host_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/native-binding-cache
        id: native-cache
        if: inputs.use_native_cache
        with:
          target: ${{ matrix.target }}
          profile: release

      - uses: ./.github/actions/ci-build-native-host
        with:
          target: ${{ matrix.target }}
          build_args: ${{ matrix.build-args }}
          cache_prefix: ${{ inputs.cache_prefix }}
          skip_build_on_cache_hit: ${{ inputs.use_native_cache && 'true' || 'false' }}
          native_cache_hit: ${{ steps.native-cache.outputs.cache-hit }}
