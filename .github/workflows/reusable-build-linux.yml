name: Reusable — build Linux native targets

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  OPUS_STATIC: "1"

on:
  workflow_call:
    inputs:
      cache_prefix:
        description: Swatinem/rust-cache prefix key
        type: string
        default: v1-native-release
      use_native_cache:
        description: Restore/save per-target .node cache before compile
        type: boolean
        default: true
      linux_x64_matrix:
        description: JSON array of {target,zig} to compile on linux x64
        type: string
        default: '[{"target":"x86_64-unknown-linux-gnu","zig":"false"},{"target":"x86_64-unknown-linux-musl","zig":"true"}]'
      build_linux_arm64:
        description: Compile aarch64-unknown-linux-gnu when true
        type: boolean
        default: true

jobs:
  build-linux-x64:
    name: Build - ${{ matrix.target }}
    if: inputs.linux_x64_matrix != '[]' && inputs.linux_x64_matrix != ''
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository }}/ci-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.linux_x64_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/native-binding-cache
        id: native-cache
        if: inputs.use_native_cache
        with:
          target: ${{ matrix.target }}
          profile: release

      - uses: ./.github/actions/ci-build-native-linux
        with:
          target: ${{ matrix.target }}
          profile: release
          cache_prefix: ${{ inputs.cache_prefix }}
          cache_target_label: Linux-x64
          platform: 'true'
          zig: ${{ matrix.zig }}
          skip_build_on_cache_hit: ${{ inputs.use_native_cache && 'true' || 'false' }}
          native_cache_hit: ${{ steps.native-cache.outputs.cache-hit }}

  build-linux-arm64:
    name: Build - aarch64-unknown-linux-gnu
    if: inputs.build_linux_arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/native-binding-cache
        id: native-cache
        if: inputs.use_native_cache
        with:
          target: aarch64-unknown-linux-gnu
          profile: release

      - uses: ./.github/actions/ci-build-native-linux
        with:
          target: aarch64-unknown-linux-gnu
          profile: release
          cache_prefix: ${{ inputs.cache_prefix }}
          cache_target_label: Linux-arm64
          setup_host_toolchain: 'true'
          platform: 'true'
          zig: 'false'
          skip_build_on_cache_hit: ${{ inputs.use_native_cache && 'true' || 'false' }}
          native_cache_hit: ${{ steps.native-cache.outputs.cache-hit }}
