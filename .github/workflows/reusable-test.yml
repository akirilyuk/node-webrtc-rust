name: Reusable — integration tests (DinD + coturn)

on:
  workflow_call:
    inputs:
      test_script:
        description: Bash script path under repo root
        type: string
        required: true
      binding_target:
        description: Linux-gnu artifact target triple
        type: string
        default: x86_64-unknown-linux-gnu

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind
        options: >-
          --privileged
          --health-cmd "docker info"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_TLS_VERIFY: 1
      DOCKER_CERT_PATH: /certs/client
      TURN_AVAILABLE: "1"
      CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/ci-run-integration-tests
        with:
          test_script: ${{ inputs.test_script }}
          binding_target: ${{ inputs.binding_target }}
          ci_image: ${{ env.CI_IMAGE }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
