name: Reusable — integration tests (host Docker + coturn)

on:
  workflow_call:
    inputs:
      test_script:
        description: Bash script path under repo root
        type: string
        required: true
      skip:
        description: When 'true', exit immediately (docs-only / CI-only skip gates) — job still succeeds for required checks
        type: string
        default: 'false'
      quality_result:
        description: Result of the Typecheck & lint job (success required when skip is false)
        type: string
        default: skipped
      binding_artifact:
        description: Uploaded .node artifact from compile/build-linux (skip download when empty)
        type: string
        default: ''
      binding_profile:
        description: native-binding-cache profile when artifact download is skipped
        type: string
        default: debug
      require_binding_artifact:
        description: Fail when the binding artifact is missing (compile/build-linux ran); 'true' or true
        type: string
        default: 'false'
      needs_native_binding:
        description: When 'true', restore/verify .node before integration tests
        type: string
        default: 'false'
      needs_ts_dist:
        description: When 'true', restore TS dist cache before integration tests
        type: string
        default: 'false'

jobs:
  test:
    name: Test
    runs-on: self-hosted
    env:
      TURN_AVAILABLE: '1'
      CI_IMAGE: ghcr.io/${{ github.repository }}/ci-build:latest
    steps:
      - name: Skip integration tests (no code or test-CI changes)
        if: inputs.skip == 'true'
        run: echo "::notice::Skipping integration tests — no code or integration-test CI changes in this PR."

      - name: Require quality passed before integration tests
        if: inputs.skip != 'true' && inputs.needs_native_binding == 'true' && inputs.quality_result != 'success'
        run: |
          echo "Typecheck & lint must pass before integration tests (quality=${{ inputs.quality_result }})." >&2
          exit 1

      - name: Prepare workspace
        if: inputs.skip != 'true'
        run: |
          if [[ -n "${RUNNER_WORKSPACE:-}" && -d "${RUNNER_WORKSPACE}" ]]; then
            docker run --rm \
              -v "${RUNNER_WORKSPACE}:${RUNNER_WORKSPACE}" \
              alpine:3.20 \
              chown -R "$(id -u):$(id -g)" "${RUNNER_WORKSPACE}" || true
          fi

      - uses: actions/checkout@v4
        if: inputs.skip != 'true'

      - name: Download native binding artifact
        id: binding-artifact
        if: inputs.skip != 'true' && inputs.needs_native_binding == 'true' && inputs.binding_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.binding_artifact }}
          path: packages/bindings
        continue-on-error: ${{ inputs.require_binding_artifact != 'true' }}

      # GHA cache restore often misses in workflow_call jobs even after a hit in the
      # caller (compile-native). Artifact download is the reliable same-run path.
      - uses: ./.github/actions/native-binding-cache
        if: inputs.skip != 'true' && inputs.needs_native_binding == 'true' && (inputs.binding_artifact == '' || steps.binding-artifact.outcome == 'failure')
        with:
          target: x86_64-unknown-linux-gnu
          profile: ${{ inputs.binding_profile }}

      - name: Verify native binding in workspace
        if: inputs.skip != 'true' && inputs.needs_native_binding == 'true'
        run: |
          shopt -s nullglob
          files=(packages/bindings/*.node)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No .node in packages/bindings after artifact/cache restore." >&2
            exit 1
          fi
          echo "Native binding ready: $(basename "${files[0]}")"

      - uses: ./.github/actions/ci-cache-ts-dist
        if: inputs.skip != 'true' && inputs.needs_ts_dist == 'true'
        id: ts-cache
        with:
          profile: release

      - uses: ./.github/actions/ci-run-integration-tests
        if: inputs.skip != 'true'
        with:
          test_script: ${{ inputs.test_script }}
          ci_image: ${{ env.CI_IMAGE }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ts_dist_cache_hit: ${{ steps.ts-cache.outputs.cache-hit || 'false' }}
