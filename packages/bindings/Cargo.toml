[package]
name = "node-webrtc-rust-bindings"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "NAPI-RS bindings exposing WebRTC and mixing APIs to Node.js"

[features]
default = []
# Opt-in Silero VAD via ort load-dynamic — operators must install libonnxruntime locally (see VOICE-VAD-AND-BARGE-IN.md).
silero-vad = ["node-webrtc-rust-speech/silero-vad"]

[lib]
crate-type = ["cdylib"]

[dependencies]
node-webrtc-rust-core = { path = "../../crates/core" }
node-webrtc-rust-mixer = { path = "../../crates/mixer" }
node-webrtc-rust-conference = { path = "../../crates/conference" }
node-webrtc-rust-speech = { path = "../../crates/speech" }
node-webrtc-rust-vendor-assemblyai = { path = "../../crates/vendor-assemblyai" }
node-webrtc-rust-vendor-cartesia = { path = "../../crates/vendor-cartesia", features = ["live"] }
node-webrtc-rust-vendor-deepgram = { path = "../../crates/vendor-deepgram", features = ["live"] }
node-webrtc-rust-vendor-elevenlabs = { path = "../../crates/vendor-elevenlabs", features = ["live"] }
node-webrtc-rust-vendor-google = { path = "../../crates/vendor-google", features = ["live"] }
node-webrtc-rust-vendor-mock = { path = "../../crates/vendor-mock" }
node-webrtc-rust-vendor-openai = { path = "../../crates/vendor-openai", features = ["live"] }
node-webrtc-rust-vendor-sherpa-onnx = { path = "../../crates/vendor-sherpa-onnx" }
napi = { workspace = true, features = ["async", "napi4", "tokio_rt"] }
napi-derive = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }

[build-dependencies]
napi-build = "2"
